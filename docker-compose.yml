services:
  web:
    build: .
    image: tfg-web:dev
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      NODE_ENV: development
      DATABASE_PATH: /app/database.sqlite
      SESSION_SECRET: ${SESSION_SECRET:-cambiar-en-produccion}
    volumes:
      - ./src:/app/src
      - ./database.sqlite:/app/database.sqlite
